name: Build turntable FFmpeg wasm core

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Fetch ffmpeg.wasm sources
        run: git clone --depth 1 --recurse-submodules https://github.com/ffmpegwasm/ffmpeg.wasm.git ffmpeg-wasm

      - name: Use FFmpeg 7.1 for current ProRes alpha support
        working-directory: ffmpeg-wasm
        run: |
          sed -i 's/ENV FFMPEG_VERSION=n5.1.4/ENV FFMPEG_VERSION=n7.1/' Dockerfile
          # The wasm command wrapper targets FFmpeg 5.1. These fields were
          # renamed or removed in FFmpeg 7; neither affects PNG-to-MOV output.
          sed -i 's/pkt_duration/duration/g' src/fftools/ffmpeg.c src/fftools/ffprobe.c
          sed -i '/\/\* compute min output value \*\//,/^        }$/d' src/fftools/ffmpeg.c
          # This app only invokes ffmpeg. Excluding the unused legacy ffprobe
          # program avoids unrelated AVFrame fields removed by FFmpeg 7.
          sed -i '/src\/fftools\/ffprobe.c/d' build/ffmpeg-wasm.sh

      - name: Build single-threaded browser core
        working-directory: ffmpeg-wasm
        run: make prd

      - name: Package browser assets
        uses: actions/upload-artifact@v4
        with:
          name: turntable-ffmpeg-core-7.1
          path: |
            ffmpeg-wasm/packages/core/dist/esm/ffmpeg-core.js
            ffmpeg-wasm/packages/core/dist/esm/ffmpeg-core.wasm
          if-no-files-found: error
